name: mi-calendario-dev

services:

  # ─── GraphQL / Express API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "4001:4001"
    volumes:
      # Bind-mount source for hot-reload; node_modules stays in the image
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # Persist the SQLite database across container restarts
      - ./backend/src/database:/app/src/database
    env_file:
      - ./backend/.env
    restart: unless-stopped

  # ─── Vue 3 + Vite frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for HMR; node_modules stays in the image
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    environment:
      - VITE_GRAPHQL_URL=http://localhost:4001/graphql
      - VITE_LOGIN_URL=/login
    depends_on:
      - backend
    restart: unless-stopped
